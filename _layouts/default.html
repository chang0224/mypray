<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙏</text></svg>">
  <link rel="apple-touch-icon" href="{{ '/assets/icon-180.png' | relative_url }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="myQT">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.7; color: #333; }

    .lock-screen {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .lock-box {
      background: white; padding: 3rem; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; max-width: 360px; width: 90%;
    }
    .lock-box h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #333; }
    .lock-box p { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }
    .lock-box input {
      width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 1rem; text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s;
    }
    .lock-box input:focus { border-color: #667eea; }
    .lock-box button {
      width: 100%; padding: 12px; margin-top: 1rem; background: #667eea; color: white;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s;
    }
    .lock-box button:hover { background: #5a6fd6; }
    .lock-box .error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.8rem; display: none; }
    .lock-icon { font-size: 3rem; margin-bottom: 1rem; }

    .content-wrapper {
      display: none; max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem;
    }
    .content-wrapper.visible { display: block; }
    .site-header {
      border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .site-header a { color: #667eea; text-decoration: none; font-weight: 600; }
    .site-header .logout { font-size: 0.85rem; color: #999; cursor: pointer; }
    .site-header .logout:hover { color: #e74c3c; }

    .content h1 { font-size: 1.8rem; margin: 1.5rem 0 1rem; color: #2c3e50; }
    .content h2 { font-size: 1.4rem; margin: 1.5rem 0 0.8rem; color: #34495e; }
    .content h3 { font-size: 1.15rem; margin: 1.2rem 0 0.6rem; color: #4a5568; }
    .content p { margin: 0.6rem 0; }
    .content blockquote { border-left: 4px solid #667eea; padding: 0.5rem 1rem; margin: 1rem 0; background: #f8f9ff; border-radius: 0 8px 8px 0; }
    .content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    .content th, .content td { padding: 10px 12px; border: 1px solid #e0e0e0; text-align: left; }
    .content th { background: #f5f6fa; font-weight: 600; }
    .content a { color: #667eea; }
    .content hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    .content code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .content pre { background: #f5f6fa; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
    .content ul, .content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .content li { margin: 0.3rem 0; }
    .content strong { color: #2c3e50; }
  </style>
</head>
<body>
  <div class="lock-screen" id="lockScreen">
    <div class="lock-box">
      <div class="lock-icon">🙏</div>
      <h1>my QT</h1>
      <p>열람을 위해 암호를 입력하세요</p>
      <input type="password" id="pwdInput" placeholder="••••" maxlength="10" autocomplete="off">
      <button onclick="checkPassword()">확인</button>
      <p class="error" id="errorMsg">암호가 올바르지 않습니다</p>
    </div>
  </div>

  <div class="content-wrapper" id="contentWrapper">
    <div class="site-header">
      <a href="{{ '/' | relative_url }}">🙏 my QT</a>
      <span class="logout" onclick="doLogout()">잠금</span>
    </div>
    <div class="content">
      {{ content }}
    </div>
  </div>

  <script>
    var ROUTES = {
      '157b61ae6f4492e9c2fd81cd825779a6412d653afe87f15b6b42a50c5fcc8de7': '{{ "/myQT/" | relative_url }}',
      'afc29d7e2a516e2f2de1dfd3e420f0c48d56ff1b888a8a31fedcaa2e07f3cfcd': '{{ "/myPrayer/" | relative_url }}'
    };
    async function sha256(str) {
      var buf = new TextEncoder().encode(str);
      var hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }
    async function checkPassword() {
      var v = document.getElementById('pwdInput').value;
      var h = await sha256(v);
      if (ROUTES[h]) {
        sessionStorage.setItem('pray_auth', '1');
        window.location.href = ROUTES[h];
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('pwdInput').value = '';
      }
    }
    function doLogout() {
      sessionStorage.removeItem('pray_auth');
      window.location.href = '{{ "/" | relative_url }}';
    }
    document.getElementById('pwdInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
    if (sessionStorage.getItem('pray_auth') === '1') {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('contentWrapper').classList.add('visible');
    }
  </script>
</body>
</html>
